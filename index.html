  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n this.PALETTE[(i<0?0:i)%this.PALETTE.length]; }\n  clonePlaced(){ return JSON.parse(JSON.stringify(this.state.placed)); }\n  stripCourse(p,id){ this.ROWS.forEach(r=>{ if(r.type!==\"class\") return; this.DAY_KEYS.forEach(d=>{ if(p[r.id][d] && p[r.id][d].courseId===id) delete p[r.id][d]; }); }); }\n  isPlaced(id){ for(const r of this.ROWS){ if(r.type!==\"class\") continue; for(const d of this.DAY_KEYS){ const c=this.state.placed[r.id][d]; if(c && c.courseId===id) return true; } } return false; }\n\n  componentDidMount(){\n    let init={};\n    try{\n      const raw=localStorage.getItem(this.STORAGE_KEY);\n      if(raw){\n        const d=JSON.parse(raw);\n        if(d.placed){ const p=this.blankPlaced(); this.ROWS.forEach(r=>{ if(r.type===\"class\"&&d.placed[r.id]) p[r.id]=d.placed[r.id]; }); init.placed=p; }\n        if(d.currentSection) init.currentSection=d.currentSection;\n        if(Array.isArray(d.customCourses)) init.customCourses=d.customCourses;\n        if(d.selected) init.selected=d.selected;\n        if(typeof d.dark===\"boolean\") init.dark=d.dark;\n      }\n    }catch(e){}\n    if(init.dark===undefined && this.props.startDark) init.dark=true;\n    if(Object.keys(init).length) this.setState(init);\n    this._t=setInterval(()=>this.setState({now:Date.now()}),20000);\n  }\n  componentWillUnmount(){ clearInterval(this._t); }\n\n  saveStateNow(){\n    try{\n      localStorage.setItem(this.STORAGE_KEY, JSON.stringify({\n        placed:this.state.placed, currentSection:this.state.currentSection,\n        customCourses:this.state.customCourses, selected:this.state.selected, dark:this.state.dark\n      }));\n    }catch(e){}\n  }\n\n  toMin(t){ const [h,m]=t.split(\":\").map(n=>parseInt(n,10)); const h24 = h===12 ? 12 : (h<9 ? h+12 : h); return h24*60+m; }\n  activeInfo(now){\n    const dt=new Date(now); const gd=dt.getDay();\n    const todayKey = (gd>=1 && gd<=6) ? this.DAY_KEYS[gd-1] : null;\n    const mins=dt.getHours()*60+dt.getMinutes();\n    let activeRowId=null;\n    if(todayKey){ for(const r of this.classRows()){ if(mins>=this.toMin(r.start) && mins<this.toMin(r.end)){ activeRowId=r.id; break; } } }\n    return {todayKey, activeRowId, mins};\n  }\n\n  flash(keys){ this.setState({conflictKeys:keys}); clearTimeout(this._cf); this._cf=setTimeout(()=>this.setState({conflictKeys:[]}),950); }\n\n  selIdxFor(id){\n    const c=this.findCourse(id); if(!c) return 0;\n    const s=this.state.selected[id];\n    if(s!=null && c.offerings[+s]) return +s;\n    if(this.state.currentSection){ const pre=c.offerings.findIndex(o=>o.section===this.state.currentSection); if(pre>=0) return pre; }\n    return 0;\n  }\n\n  placeCourse(id, idx){\n    const course=this.findCourse(id); const off=course.offerings[idx];\n    const placed=this.clonePlaced();\n    const conflicts=off.sessions.filter(s=>placed[s.row][s.day] && placed[s.row][s.day].courseId!==id);\n    if(conflicts.length){\n      this.flash(conflicts.map(s=>s.row+\"|\"+s.day));\n      const clash=placed[conflicts[0].row][conflicts[0].day].name;\n      this.setState({subline:'Can\\u2019t place \\u201C'+course.name+'\\u201D \\u2014 it clashes with \\u201C'+clash+'\\u201D. Remove that first.'});\n      return;\n    }\n    this.stripCourse(placed,id);\n    off.sessions.forEach(s=>{ placed[s.row][s.day]={courseId:course.id,name:course.name,code:course.code,prof:off.prof,room:(s.room!=null&&s.room!==\"\")?s.room:off.room,label:s.label}; });\n    this.setState({placed, subline:'Placed \\u201C'+course.name+'\\u201D with '+off.prof+'.'}, ()=>this.saveStateNow());\n  }\n\n  removeCourse(id,name){\n    const placed=this.clonePlaced(); this.stripCourse(placed,id);\n    this.setState({placed, subline:'Removed \\u201C'+name+'\\u201D.'}, ()=>this.saveStateNow());\n  }\n\n  applySection(section){\n    const placed=this.clonePlaced(); let filled=0;\n    this.allCourses().forEach(c=>{\n      const idx=c.offerings.findIndex(o=>o.section===section);\n      if(section && idx>=0){\n        const off=c.offerings[idx];\n        const conflict=off.sessions.some(s=>placed[s.row][s.day] && placed[s.row][s.day].courseId!==c.id);\n        if(!conflict){ this.stripCourse(placed,c.id); off.sessions.forEach(s=>{ placed[s.row][s.day]={courseId:c.id,name:c.name,code:c.code,prof:off.prof,room:(s.room!=null&&s.room!==\"\")?s.room:off.room,label:s.label}; }); filled++; }\n      } else if(c.offerings.some(o=>o.section)){ this.stripCourse(placed,c.id); }\n    });\n    this.setState({placed, currentSection:section, subline: section ? ('Section '+section+' selected \\u2014 auto-filled '+filled+' core course'+(filled===1?'':'s')+'. Add your electives below.') : 'Section cleared.'}, ()=>this.saveStateNow());\n  }\n\n  setField(k,v){ this.setState({addForm:{...this.state.addForm,[k]:v,error:\"\"}}); }\n  setSlot(i,f,v){ const slots=this.state.addForm.slots.map((s,idx)=>idx===i?{...s,[f]:v}:s); this.setState({addForm:{...this.state.addForm,slots}}); }\n  addSlot(){ this.setState({addForm:{...this.state.addForm,slots:this.state.addForm.slots.concat([{day:\"Mon\",row:\"r1\"}])}}); }\n  removeSlot(i){ const s=this.state.addForm.slots; if(s.length>1) this.setState({addForm:{...this.state.addForm,slots:s.filter((_,idx)=>idx!==i)}}); }\n\n  saveCustom(){\n    const f=this.state.addForm;\n    const name=f.name.trim(), code=f.code.trim(), room=f.room.trim(); let prof=f.prof.trim();\n    if(!name||!code||!room||!prof){ this.setState({addForm:{...f,error:\"Fill in name, code, professor, and room.\"}}); return; }\n    if(!\/^(prof\\.|dr\\.|mr\\.|ms\\.|mrs\\.)\/i.test(prof)) prof=\"Prof. \"+prof;\n    const sessions=f.slots.map(s=>({day:s.day,row:s.row,label:\"Custom\"}));\n    const id=\"custom_\"+code.toLowerCase().replace(\/[^a-z0-9]\/g,\"\")+\"_\"+Date.now();\n    const course={id,name,code,custom:true,offerings:[{prof,room,sessions}]};\n    this.setState({customCourses:this.state.customCourses.concat([course]), addOpen:false, addForm:this.blankForm(), subline:'Added \\u201C'+name+'\\u201D to your course pool.'}, ()=>this.saveStateNow());\n  }\n\n  \/\/ ===== Upload updated timetable (xlsx) =====\n  normName(s){ return String(s==null?\"\":s).replace(\/\\s+\/g,\" \").trim().toLowerCase(); }\n\n  onClearAll(){\n    const placed=this.clonePlaced();\n    this.ROWS.forEach(rw=>{ if(rw.type!==\"class\") return; this.DAY_KEYS.forEach(d=>{ placed[rw.id][d]=null; }); });\n    this.setState({placed,currentSection:\"\",subline:\"Timetable cleared \\u2014 start fresh.\"},()=>this.saveStateNow());\n  }\n\n  onUploadClick(){\n    const input=document.getElementById(\"iimTimetableUploadInput\");\n    if(input) input.click();\n  }\n\n  onUploadFile(e){\n    const file=e.target.files && e.target.files[0];\n    e.target.value=\"\";\n    if(!file) return;\n    if(!window.XLSX){\n      this.setState({subline:\"Could not read the file — the Excel parser didn’t load. Check your connection and try again.\"});\n      return;\n    }\n    this.setState({subline:\"Reading “\"+file.name+\"”…\"});\n    const reader=new FileReader();\n    reader.onload=(ev)=>{\n      try{\n        const data=new Uint8Array(ev.target.result);\n        const wb=window.XLSX.read(data,{type:\"array\"});\n        const ws=wb.Sheets[wb.SheetNames[0]];\n        const grid=window.XLSX.utils.sheet_to_json(ws,{header:1,raw:true,defval:null});\n        const merges=ws[\"!merges\"]||[];\n        const byName=this.parseUploadedTimetable(grid,merges);\n        this.syncUploadedTimetable(byName);\n      }catch(err){\n        console.error(\"[timetable upload] failed to parse workbook:\",err);\n        this.setState({subline:\"Couldn’t parse that file — make sure it’s the academic section’s timetable Excel export.\"});\n      }\n    };\n    reader.onerror=()=>{ this.setState({subline:\"Couldn’t read that file.\"}); };\n    reader.readAsArrayBuffer(file);\n  }\n\n  \/\/ Builds a map of normalized-course-name -> { offerings:[{prof,room,sessions:[{day,row,label}]}] }\n  \/\/ from the raw grid (array-of-arrays, 0-indexed) + the worksheet's merge ranges.\n  \/\/ Mirrors the (day, slot, section) -> {course, faculty, room, time} shape the app\n  \/\/ already uses for its built-in COURSES data.\n  parseUploadedTimetable(grid, merges){\n    const DAY_KEY_BY_NAME={MONDAY:\"Mon\",TUESDAY:\"Tue\",WEDNESDAY:\"Wed\",THURSDAY:\"Thu\",FRIDAY:\"Fri\",SATURDAY:\"Sat\"};\n    const rowOrder=this.classRows(); \/\/ ROWS entries with type \"class\", in app order\n    \/\/ Known course names (normalized) from this app's own course list, used to\n    \/\/ tell \"a single course name that happens to contain a comma\" (e.g.\n    \/\/ \"Energy Efficiency, Net Zero & Climate Change Mgmt\") apart from \"several\n    \/\/ comma-separated alternative course names sharing one slot\" — without this,\n    \/\/ a blind comma-split would wrongly chop up legitimate comma-containing names.\n    const knownNames=new Set(this.allCourses().map(c=>this.normName(c.name)));\n    const nRows=grid.length;\n    const nCols=grid.reduce((m,r)=>Math.max(m,r?r.length:0),0);\n\n    const get=(r,c)=> (grid[r] && grid[r][c]!=null) ? grid[r][c] : null;\n\n    \/\/ Map every (row,col) to its merge anchor (top-left) value, so merged blocks\n    \/\/ read as a single repeated value across their span — same idea as openpyxl's\n    \/\/ merged_cells handling used to validate this parser against the sample file.\n    const mergeOf={}; \/\/ \"r,c\" -> {r0,c0}\n    merges.forEach(m=>{\n      for(let r=m.s.r;r<=m.e.r;r++){\n        for(let c=m.s.c;c<=m.e.c;c++){\n          mergeOf[r+\",\"+c]={r0:m.s.r,c0:m.s.c};\n        }\n      }\n    });\n    const cellVal=(r,c)=>{\n      const anchor=mergeOf[r+\",\"+c];\n      return anchor ? get(anchor.r0,anchor.c0) : get(r,c);\n    };\n\n    \/\/ Parses a free-form time-range header like \"08:00 am to 9:30 am\" or\n    \/\/ \"14:30 to 16:00\" into its start time in minutes-since-midnight, so we\n    \/\/ can match it against this app's ROWS (which use 24h \"H:MM\" strings)\n    \/\/ regardless of exact punctuation\/AM-PM formatting in the uploaded sheet.\n    const parseStartMinutes=(label)=>{\n      const m=\/(\\d{1,2})[:.](\\d{2})\\s*(am|pm)?\/i.exec(String(label));\n      if(!m) return null;\n      let h=parseInt(m[1],10); const mins=parseInt(m[2],10); const ap=(m[3]||\"\").toLowerCase();\n      if(ap===\"pm\" && h<12) h+=12;\n      if(ap===\"am\" && h===12) h=0;\n      if(!ap && h<8) h+=12; \/\/ bare \"14:30\"-style 24h already fine; \"2:30\"-style afternoon slots without am\/pm\n      return h*60+mins;\n    };\n    const rowStartMinutes=rowOrder.map(rw=>{\n      const m=\/(\\d{1,2}):(\\d{2})\/.exec(rw.start);\n      let h=parseInt(m[1],10); const mins=parseInt(m[2],10);\n      if(h<=8) h+=12; \/\/ ROWS uses bare 24h-ish strings (\"02:30\",\"08:00\"…) all meaning PM for the afternoon\/evening slots\n      return {row:rw, startMin:h*60+mins};\n    });\n\n    \/\/ Row-1 time-slot column groups: only merged ranges spanning row 0 count as\n    \/\/ real slot blocks (each real slot has its own SLOTS-row code underneath).\n    \/\/ Stray unmerged header cells (seen in real exports, e.g. a leftover\n    \/\/ \"08:00 am to 9:30 am\" single column before the actual first slot) never\n    \/\/ carry a SLOTS code of their own — any course text sitting under one is a\n    \/\/ duplicate of the adjacent real slot's data, so we skip them rather than\n    \/\/ invent a phantom time slot for it.\n    const headerGroups=[]; \/\/ {c0,c1,label}\n    merges.forEach(m=>{\n      if(m.s.r===0 && m.e.r===0){\n        const label=get(0,m.s.c);\n        if(label!=null && String(label).trim() && !\/^time$\/i.test(String(label).trim())){\n          headerGroups.push({c0:m.s.c,c1:m.e.c,label:String(label).trim()});\n        }\n      }\n    });\n    headerGroups.sort((a,b)=>a.c0-b.c0);\n\n    const byName={};\n    const addOffering=(name,prof,room,session,ambiguous)=>{\n      const key=this.normName(name);\n      if(!key) return;\n      if(!byName[key]) byName[key]={displayName:String(name).trim(),offerings:[]};\n      \/\/ Group into the same offering when name+prof match (room is taken from\n      \/\/ whichever session is recorded first — same shape as this app's\n      \/\/ existing COURSES data, where room lives at the offering level; a\n      \/\/ course's room is occasionally listed slightly differently between two\n      \/\/ days of the same week in real exports, which is a presentation\n      \/\/ detail, not a sign they're different offerings). This lets one\n      \/\/ genuine course taught at two different timeslots on different days\n      \/\/ (e.g. Thursday evening + Friday evening, same professor) merge into a\n      \/\/ single offering with both sessions, which is what this app expects.\n      \/\/\n      \/\/ EXCEPT: candidates that came from an ambiguous \"elective basket\" cell\n      \/\/ (several comma\/slash-separated names cross-joined with every faculty\n      \/\/ column in the block, since the sheet doesn't say which name belongs\n      \/\/ to which column — see the caller) are also keyed by ROW. Those\n      \/\/ candidates can coincidentally share a name+prof with an unrelated\n      \/\/ offering at a different timeslot purely as cross-product noise, and\n      \/\/ must not be allowed to merge into a real offering's sessions.\n      const matchRow=ambiguous ? session.row : null;\n      let off=byName[key].offerings.find(o=>this.normName(o.prof)===this.normName(prof) && (matchRow===null ? !o.ambiguous : (o.ambiguous && o.row===matchRow)));\n      if(!off){ off={prof:String(prof||\"\").trim(),room:room==null?\"\":String(room).trim(),row:session.row,ambiguous:!!ambiguous,sessions:[]}; byName[key].offerings.push(off); }\n      off.sessions.push(session);\n    };\n\n    let r=0;\n    while(r<nRows){\n      const dayCell=get(r,0);\n      const dayName=dayCell!=null ? String(dayCell).trim().toUpperCase() : \"\";\n      if(DAY_KEY_BY_NAME[dayName]){\n        const dayKey=DAY_KEY_BY_NAME[dayName];\n        const slotsRow=r, courseRow=r+1, sectionRow=r+2, facultyRow=r+3, roomRow=r+4;\n        headerGroups.forEach(({c0,c1,label})=>{\n          const courseRaw=cellVal(courseRow,c0);\n          if(courseRaw==null || !String(courseRaw).trim()) return;\n          if(\/lunch\/i.test(String(courseRaw))) return;\n          \/\/ \"\/\" is the documented separator for alternative courses sharing a\n          \/\/ slot. Some cells in real exports use \", \" instead. Split each\n          \/\/ \"\/\"-segment on commas too, UNLESS the segment, taken whole, already\n          \/\/ matches one of this app's known course names exactly (normalized) —\n          \/\/ that guards real course names that happen to contain a comma (e.g.\n          \/\/ \"Energy Efficiency, Net Zero & Climate Change Mgmt\"-style names)\n          \/\/ from being incorrectly chopped into fragments.\n          let names=[];\n          String(courseRaw).split(\"\/\").map(s=>s.trim()).filter(Boolean).forEach(seg=>{\n            if(knownNames.has(this.normName(seg)) || !\/,\/.test(seg)){\n              names.push(seg);\n            } else {\n              names.push(...seg.split(\",\").map(s=>s.trim()).filter(Boolean));\n            }\n          });\n          if(!names.length) return;\n\n          \/\/ Map this app's ROW id (r1..r6) to the slot via the time label, so\n          \/\/ sessions line up with the existing ROWS-based grid. Match by closest\n          \/\/ start time (within 20 min) rather than exact text — uploaded sheets\n          \/\/ vary in punctuation\/AM-PM formatting (\"9:30 am to 11:00 am\" vs\n          \/\/ \"14:30 to 16:00\" for the same row across different time-of-day text).\n          const labelStart=parseStartMinutes(label);\n          let best=null, bestDiff=Infinity;\n          if(labelStart!=null){\n            rowStartMinutes.forEach(({row,startMin})=>{\n              const diff=Math.abs(startMin-labelStart);\n              if(diff<bestDiff){ bestDiff=diff; best=row; }\n            });\n          }\n          const rowId=(best && bestDiff<=20) ? best.id : null;\n          if(!rowId) return; \/\/ surprise-test \/ lunch \/ unmapped slot — skip\n\n          const slotLabel=cellVal(slotsRow,c0);\n\n          \/\/ Faculty\/room entries present anywhere in this header block's columns,\n          \/\/ left-to-right (column order = source order in the sheet).\n          const facCols=[];\n          for(let c=c0;c<=c1;c++){\n            const fv=cellVal(facultyRow,c);\n            if(fv!=null && String(fv).trim()){\n              facCols.push({c, prof:String(fv).trim(), room:cellVal(roomRow,c)});\n            }\n          }\n          \/\/ Section letters present in this block, left-to-right.\n          const secCols=[];\n          for(let c=c0;c<=c1;c++){\n            const sv=cellVal(sectionRow,c);\n            if(sv!=null && String(sv).trim()){\n              secCols.push({c, section:String(sv).trim()});\n            }\n          }\n\n          if(!facCols.length){\n            \/\/ No faculty info anywhere in this block — nothing reliable to record.\n          } else if(names.length===1){\n            \/\/ Single course name, one or more faculty\/section columns in the\n            \/\/ block (e.g. one column per section). Every populated faculty\n            \/\/ column genuinely belongs to this one name.\n            facCols.forEach(f=>{\n              const sec=secCols.find(s=>s.c===f.c);\n              addOffering(names[0],f.prof,f.room,{day:dayKey,row:rowId,label:slotLabel||(sec?sec.section:\"\")});\n            });\n          } else {\n            \/\/ Multiple comma\/slash-separated course names sharing one merged\n            \/\/ label (\"elective basket\" cells). The sheet itself doesn't say\n            \/\/ which listed name belongs to which populated faculty column —\n            \/\/ verified against this app's own known course rosters, neither\n            \/\/ strict left-to-right position nor section-letter position\n            \/\/ reliably picks the right one across different basket cells in\n            \/\/ real exports. Rather than guess a single pairing, record every\n            \/\/ (name × faculty-column) combination as a *candidate* offering.\n            \/\/ This never invents a wrong final answer on its own: at sync time\n            \/\/ each already-selected course is matched back to its currently\n            \/\/ known professor (exact, case\/whitespace-normalized match) before\n            \/\/ any candidate is used, so only genuinely-correct combinations\n            \/\/ (where the candidate's professor matches the professor already\n            \/\/ on record for that course) ever get applied; non-matching noise\n            \/\/ candidates are simply never picked.\n            facCols.forEach(f=>{\n              const sec=secCols.find(s=>s.c===f.c);\n              names.forEach(name=>{\n                addOffering(name,f.prof,f.room,{day:dayKey,row:rowId,label:slotLabel||(sec?sec.section:\"\")},true);\n              });\n            });\n          }\n        });\n        r+=5;\n      } else {\n        r+=1;\n      }\n    }\n    return byName;\n  }\n\n  \/\/ Takes the freshly parsed (name -> offerings) map and updates every\n  \/\/ already-selected course (by name) in this.state.placed with the new\n  \/\/ day\/row\/faculty\/room, keeping it selected. Courses not found are left\n  \/\/ untouched (with a console warning) so the app never breaks.\n  syncUploadedTimetable(byName){\n    const placed=this.clonePlaced();\n    const allCourses=this.allCourses();\n\n    \/\/ Find every distinct courseId currently placed somewhere on the grid.\n    const placedIds=new Set();\n    this.ROWS.forEach(rw=>{\n      if(rw.type!==\"class\") return;\n      this.DAY_KEYS.forEach(d=>{ const c=placed[rw.id][d]; if(c) placedIds.add(c.courseId); });\n    });\n\n    let updated=0, missing=[];\n    placedIds.forEach(courseId=>{\n      const course=allCourses.find(c=>c.id===courseId);\n      if(!course) return;\n      const match=byName[this.normName(course.name)];\n      if(!match || !match.offerings.length){ missing.push(course.name); return; }\n\n      \/\/ Prefer an uploaded offering whose professor matches the student's\n      \/\/ currently-selected offering (keeps multi-section courses pointed at\n      \/\/ the same section, and is also the only safe way to resolve \"elective\n      \/\/ basket\" cells that produced several candidate offerings for this name\n      \/\/ — see parseUploadedTimetable). If there's exactly one uploaded\n      \/\/ offering for this course, use it even without a professor match\n      \/\/ (single-offering courses with no comma\/slash ambiguity at all). With\n      \/\/ more than one candidate offering and no professor match, there's no\n      \/\/ reliable, non-fuzzy way to pick — treat as not found rather than guess.\n      const curIdx=this.selIdxFor(courseId);\n      const curOff=course.offerings[curIdx];\n      \/\/ Union every uploaded offering whose professor matches the student's\n      \/\/ currently-selected offering. Each ambiguous \"elective basket\" candidate\n      \/\/ is keyed by row (one session each), so a multi-session course must\n      \/\/ gather sessions from ALL matching candidates rather than just the first\n      \/\/ — otherwise the second weekly session would be silently dropped.\n      let newOffs=match.offerings.filter(o=>curOff && this.normName(o.prof)===this.normName(curOff.prof));\n      if(!newOffs.length && match.offerings.length===1) newOffs=[match.offerings[0]];\n      if(!newOffs.length){ missing.push(course.name); return; }\n\n      this.stripCourse(placed,courseId);\n      newOffs.forEach(no=>no.sessions.forEach(s=>{\n        placed[s.row][s.day]={courseId, name:course.name, code:course.code, prof:no.prof, room:(s.room!=null&&s.room!==\"\")?s.room:no.room, label:s.label||\"\"};\n      }));\n      updated++;\n    });\n\n    if(missing.length) console.warn(\"[timetable upload] no match in new file for already-selected course(s):\", missing);\n\n    const subline = updated\n      ? (\"Updated \"+updated+\" course\"+(updated===1?\"\":\"s\")+\" from the new timetable.\"+(missing.length?(\" \"+missing.length+\" course\"+(missing.length===1?\"\":\"s\")+\" not found — left as-is.\") : \"\"))\n      : (missing.length ? \"None of your selected courses were found in that file — nothing changed.\" : \"No courses selected yet — upload again after picking your courses.\");\n\n    this.setState({placed, subline}, ()=>this.saveStateNow());\n  }\n\n  doDownload(){\n    if(this.state.downloading || !window.html2canvas) return;\n    this.setState({downloading:true});\n    const el=document.getElementById(\"iimGridCapture\");\n    const bg=this.state.dark?\"#0a0b24\":\"#ffffff\";\n    \/\/ Temporarily expand the element to its full table width so the horizontally\n    \/\/ scrollable columns aren't cropped out of the capture.\n    const prev={overflowX:el.style.overflowX, width:el.style.width, maxWidth:el.style.maxWidth};\n    const fullW=el.scrollWidth;\n    el.style.overflowX=\"visible\";\n    el.style.maxWidth=\"none\";\n    el.style.width=fullW+\"px\";\n    const restore=()=>{ el.style.overflowX=prev.overflowX; el.style.width=prev.width; el.style.maxWidth=prev.maxWidth; };\n    window.html2canvas(el,{backgroundColor:bg,scale:2,useCORS:true,width:fullW,windowWidth:fullW,scrollX:0,scrollY:0,onclone:(doc)=>{ const s=doc.createElement(\"style\"); s.textContent=\"*{animation:none !important;transition:none !important;opacity:1 !important}\"; doc.head.appendChild(s); }}).then(canvas=>{\n      restore();\n      const a=document.createElement(\"a\");\n      a.download=\"iim-mumbai-timetable\"+(this.state.currentSection?\"-sec\"+this.state.currentSection:\"\")+\".png\";\n      a.href=canvas.toDataURL(\"image\/png\"); a.click();\n      this.setState({downloading:false});\n    }).catch(e=>{ restore(); console.error(e); this.setState({downloading:false, subline:\"Could not generate PNG \\u2014 please try again.\"}); });\n  }\n\n  themeVars(dark, accent){\n    const soft = accent+\"24\";\n    const L={\"--bg\":\"#ece8df\",\"--surface\":\"#ffffff\",\"--surface-2\":\"#f6f4ee\",\"--ink\":\"#1a1b4b\",\"--muted\":\"#6b6c8a\",\"--faint\":\"#a9aac0\",\"--line\":\"rgba(20,21,82,.10)\",\"--navy\":\"#16175a\",\"--navy-deep\":\"#0e0f3d\",\"--navy-shadow\":\"rgba(22,23,90,.20)\",\"--header-bg\":\"#16175a\",\"--header-ink\":\"#ffffff\",\"--lunch-bg\":\"#eceaf4\",\"--lunch-ink\":\"#7b7c98\",\"--shadow\":\"rgba(20,21,82,.06)\",\"--logo-l\":\"block\",\"--logo-d\":\"none\"};\n    const D={\"--bg\":\"#0a0b24\",\"--surface\":\"#15163c\",\"--surface-2\":\"#1c1d49\",\"--ink\":\"#ededf7\",\"--muted\":\"#9b9cc2\",\"--faint\":\"#6c6d94\",\"--line\":\"rgba(255,255,255,.10)\",\"--navy\":\"#23255f\",\"--navy-deep\":\"#2c2e74\",\"--navy-shadow\":\"rgba(0,0,0,.5)\",\"--header-bg\":\"#23255f\",\"--header-ink\":\"#ededf7\",\"--lunch-bg\":\"#1f2150\",\"--lunch-ink\":\"#9b9cc2\",\"--shadow\":\"rgba(0,0,0,.4)\",\"--logo-l\":\"none\",\"--logo-d\":\"block\"};\n    const t=dark?D:L; let s=\"\"; for(const k in t) s+=k+\":\"+t[k]+\";\";\n    s+=\"--accent:\"+accent+\";--accent-soft:\"+soft+\";\";\n    s+=\"min-height:100vh;background:var(--bg);color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;letter-spacing:-.005em;padding:20px;transition:background .25s ease,color .25s ease;\";\n    return s;\n  }\n\n  renderVals(){\n    window.__iimApp=this;\n    const dark=this.state.dark;\n    const accent=this.props.accent || \"#EF7A1B\";\n    const placed=this.state.placed;\n    const {todayKey, activeRowId, mins}=this.activeInfo(this.state.now);\n    const cf=this.state.conflictKeys;\n\n    \/\/ clock + status\n    const dt=new Date(this.state.now);\n    const hh=String(dt.getHours()).padStart(2,\"0\"), mm=String(dt.getMinutes()).padStart(2,\"0\");\n    const shortDay=[\"Sun\",\"Mon\",\"Tue\",\"Wed\",\"Thu\",\"Fri\",\"Sat\"][dt.getDay()];\n    const clockLabel=shortDay+\"  \"+hh+\":\"+mm;\n    let statusLabel=\"\", statusColor=\"var(--muted)\";\n    if(!todayKey){ statusLabel=\"Weekend \\u2014 no classes\"; }\n    else if(activeRowId && placed[activeRowId][todayKey]){ statusLabel=\"In session \\u00B7 \"+placed[activeRowId][todayKey].name; statusColor=\"var(--accent)\"; }\n    else {\n      const up=this.classRows().filter(r=>this.toMin(r.start)>mins && placed[r.id][todayKey]);\n      if(up.length){ const r=up[0]; statusLabel=\"Next \\u00B7 \"+placed[r.id][todayKey].name; }\n      else statusLabel=\"No more classes today\";\n    }\n\n    \/\/ columns\n    const columns=this.ROWS.map(r=> r.type===\"lunch\" ? {label:r.time} : {label:r.start+\"\\u2013\"+r.end});\n\n    \/\/ grid\n    const gridRows=this.DAYS.map((dayName,di)=>{\n      const dayKey=this.DAY_KEYS[di];\n      const cells=this.ROWS.map(row=>{\n        const key=row.id+\"|\"+dayKey;\n        const conflict=cf.includes(key);\n        if(row.type===\"lunch\"){\n          return {isLunch:true,isFilled:false,isEmpty:false,label:row.label,color:\"transparent\",ring:\"none\",tbg:\"transparent\",cursor:\"default\",onClick:null};\n        }\n        const data=placed[row.id][dayKey];\n        if(data){\n          const color=this.colorFor(data.courseId);\n          const active=(todayKey===dayKey && activeRowId===row.id);\n          let ring=\"none\", tbg=\"var(--surface)\";\n          if(conflict){ ring=\"0 0 0 2px #ef4444\"; }\n          else if(active){ ring=\"0 0 0 2px var(--accent), 0 12px 26px var(--accent-soft)\"; tbg=\"var(--accent-soft)\"; }\n          return {isFilled:true,isLunch:false,isEmpty:false,name:data.name,prof:data.prof,room:data.room,color,ring,tbg,active,cursor:\"pointer\",onClick:()=>this.removeCourse(data.courseId,data.name)};\n        }\n        return {isEmpty:true,isLunch:false,isFilled:false,color:\"transparent\",ring:conflict?\"0 0 0 2px #ef4444\":\"none\",tbg:\"transparent\",cursor:\"default\",onClick:null};\n      });\n      return {dayName,dayKey,cells};\n    });\n\n    \/\/ pool\n    const term=this.state.searchTerm.trim().toLowerCase();\n    const matches=c=>{ if(!term) return true; if(c.name.toLowerCase().includes(term)) return true; if(c.code.toLowerCase().includes(term)) return true; return c.offerings.some(o=>o.prof.toLowerCase().includes(term)); };\n    const visible=this.allCourses().filter(matches);\n    const sessLine=(off)=>off.sessions.map(s=>{ const r=this.ROWS.find(x=>x.id===s.row); return s.day+\" \"+r.start+\" \\u00B7 Rm \"+off.room; }).join(\", \");\n    const poolCards=visible.map(course=>{\n      const isP=this.isPlaced(course.id);\n      const selIdx=this.selIdxFor(course.id);\n      const off=course.offerings[selIdx] || course.offerings[0];\n      const color=this.colorFor(course.id);\n      const multi=course.offerings.length>1;\n      let cardBg=\"var(--surface)\", cardBorder=\"var(--line)\";\n      if(isP){ cardBg=\"var(--accent-soft)\"; cardBorder=\"var(--accent)\"; }\n      else if(course.unverified){ cardBg=\"var(--surface-2)\"; cardBorder=\"rgba(201,138,19,.4)\"; }\n      return {\n        id:course.id, name:course.name, code:course.code, color, placed:isP, unverified:!!course.unverified,\n        cardBg, cardBorder,\n        hasSelect:multi, singleProf:true, profText:off.prof,\n        showSess:!isP, sessLine:sessLine(off),\n        selectValue:String(selIdx),\n        options:course.offerings.map((o,i)=>({value:String(i),label:o.prof})),\n        onCardClick:()=>{ if(isP) this.removeCourse(course.id,course.name); else this.placeCourse(course.id,this.selIdxFor(course.id)); },\n        onSelectChange:(e)=>{ const v=e.target.value; const selected={...this.state.selected,[course.id]:v}; this.setState({selected},()=>this.saveStateNow()); if(this.isPlaced(course.id)) this.placeCourse(course.id,+v); },\n      };\n    });\n\n    \/\/ add-form slots\n    const dayOptions=this.DAY_KEYS.map((k,i)=>({value:k,label:this.DAYS[i]}));\n    const classRowOptions=this.classRows().map(r=>({value:r.id,label:r.start+\"\\u2013\"+r.end}));\n    const f=this.state.addForm;\n    const slots=f.slots.map((s,i)=>({ idx:i, dayValue:s.day, rowValue:s.row, onDay:(e)=>this.setSlot(i,\"day\",e.target.value), onRow:(e)=>this.setSlot(i,\"row\",e.target.value), onRemove:()=>this.removeSlot(i) }));\n\n    return {\n      rootStyle:this.themeVars(dark,accent),\n      logoSrc: dark ? \"assets\/iim-logo-dark.png\" : \"assets\/iim-logo.png\",\n      eyebrow: \"PGDM \\u00B7 Module 5\" + (this.state.currentSection ? \" \\u00B7 Section \"+this.state.currentSection : \"\"),\n      titleMain: \"My Week \\u2014 Time Table Builder\",\n      clockLabel, statusLabel, statusColor,\n      themeIcon: dark ? \"\\u2600\" : \"\\u263E\", themeLabel: dark ? \"Light\" : \"Dark\",\n      onToggleTheme:()=>this.setState({dark:!this.state.dark},()=>this.saveStateNow()),\n      onUploadClick:()=>this.onUploadClick(), onUploadFile:(e)=>this.onUploadFile(e), uploadLabel:\"\\u2191 Upload timetable\",\n      onDownload:()=>this.doDownload(), downloadLabel: this.state.downloading ? \"Generating\\u2026\" : \"\\u2193 PNG\",\n      subline:this.state.subline,\n      sectionValue:this.state.currentSection, sectionOptions:this.SECTIONS.map(s=>({value:s,label:\"Section \"+s})),\n      onSectionChange:(e)=>this.applySection(e.target.value),\n      searchValue:this.state.searchTerm, searchHasValue:this.state.searchTerm.length>0,\n      onSearchInput:(e)=>this.setState({searchTerm:e.target.value}),\n      onSearchClear:()=>this.setState({searchTerm:\"\"}),\n      addOpen:this.state.addOpen, addLabel:this.state.addOpen?\"\\u2212 Hide\":\"+ Add course\",\n      onToggleAdd:()=>this.setState({addOpen:!this.state.addOpen}),\n      addName:f.name, addCode:f.code, addRoom:f.room, addProf:f.prof,\n      onAddName:(e)=>this.setField(\"name\",e.target.value), onAddCode:(e)=>this.setField(\"code\",e.target.value),\n      onAddRoom:(e)=>this.setField(\"room\",e.target.value), onAddProf:(e)=>this.setField(\"prof\",e.target.value),\n      slots, dayOptions, classRowOptions, onAddSlot:()=>this.addSlot(),\n      addError:f.error, addErrorShow:!!f.error,\n      onSaveCustom:()=>this.saveCustom(), onCancelCustom:()=>this.setState({addOpen:false,addForm:this.blankForm()}),\n      emptyPool:visible.length===0, poolCards,\n      columns, gridRows,\n      stopProp:(e)=>e.stopPropagation(),\n    };\n  }\n}\n<\/script>\n\n<script>\n(function() {\n  'use strict';\n  var PK = 'iimUserProfile';\n  var EK = 'iimElectives';\n\n  \/* ── storage helpers ── *\/\n  function getProfile()   { try { return JSON.parse(localStorage.getItem(PK));  } catch(e) { return null; } }\n  function saveProfile(p) { try { localStorage.setItem(PK, JSON.stringify(p));  } catch(e) {} }\n  function getSaved()     { try { return JSON.parse(localStorage.getItem(EK)) || []; } catch(e) { return []; } }\n  function saveSaved(ids) { try { localStorage.setItem(EK, JSON.stringify(ids)); } catch(e) {} }\n\n  \/* ── program name by section ── *\/\n  function progName(sec) {\n    if (!sec) return 'MBA';\n    var s = sec.toUpperCase();\n    if (s === 'I') return 'MBA-SM';\n    if ('FGH'.indexOf(s) !== -1) return 'MBA-OSCM';\n    return 'MBA';\n  }\n\n  \/* ── get elective courses (those with no section-specific offerings) ── *\/\n  function getElectives() {\n    if (!window.__iimApp) return [];\n    return window.__iimApp.allCourses().filter(function(c) {\n      return !c.custom && !c.offerings.some(function(o) { return o.section; });\n    });\n  }\n\n  \/* ── hide sidebar ── *\/\n  function hideSidebar() {\n    if (document.getElementById('_iimStyle')) return;\n    var st = document.createElement('style');\n    st.id = '_iimStyle';\n    st.textContent = 'aside { display:none !important; }';\n    document.head.appendChild(st);\n  }\n\n  \/* ── patch renderVals once; update mutable vars for repeated Modify calls ── *\/\n  \/\/ The framework re-renders the header every second (clock). Patching renderVals\n  \/\/ at source means every render — including clock ticks — uses the right values.\n  \/\/ We wrap ONCE to avoid chain-patching (which breaks section switches).\n  var _rvFirstName = '';\n  var _rvProg = 'MBA';\n  function patchRenderVals(firstName, section) {\n    if (!window.__iimApp || typeof window.__iimApp.renderVals !== 'function') return;\n    _rvFirstName = firstName || '';\n    _rvProg = progName(section);\n    if (!window.__iimApp._rvPatched) {\n      window.__iimApp._rvPatched = true;\n      var orig = window.__iimApp.renderVals.bind(window.__iimApp);\n      window.__iimApp.renderVals = function() {\n        var v = orig();\n        v.titleMain = _rvFirstName + '’s Timetable';\n        if (v.eyebrow) {\n          ['MBA-OSCM', 'MBA-SM', 'MBA', 'PGDM'].forEach(function(p) {\n            v.eyebrow = v.eyebrow.replace(p, _rvProg);\n          });\n        }\n        v.subline = '';\n        return v;\n      };\n    }\n    try { window.__iimApp.setState({}); } catch(e) {}\n  }\n\n  \/* ── apply section + electives + Excel sync ── *\/\n  \/\/ applySection() operates on a single placed-state clone. If an old-section\n  \/\/ course sits in a slot that a new-section course wants, the new course is\n  \/\/ skipped (conflict) and then the old course is stripped — but the new one\n  \/\/ was already skipped so it never gets placed.\n  \/\/ Fix: call applySection TWICE with a 150 ms gap. First call strips all\n  \/\/ old-section courses and places whichever new-section courses have clear\n  \/\/ slots. By the second call the state has settled and every previously\n  \/\/ blocked new-section course now finds its slot empty.\n  var _byName = null;\n  function applyAll(section, electiveIds, byName) {\n    if (!window.__iimApp) return;\n    \/\/ Pass 1 – remove old-section courses; place new-section courses where possible\n    window.__iimApp.applySection(section);\n    setTimeout(function() {\n      \/\/ Pass 2 – old-section courses are now gone; place any that were skipped\n      window.__iimApp.applySection(section);\n      var sel = document.querySelector('select');\n      if (sel) sel.value = section;\n      setTimeout(function() {\n        \/\/ Place selected electives\n        var all = window.__iimApp.allCourses();\n        electiveIds.forEach(function(id) {\n          var c = all.find(function(x) { return x.id === id; });\n          if (c) { try { window.__iimApp.placeCourse(id, 0); } catch(e) {} }\n        });\n        \/\/ NOTE: the built-in COURSES data is the authoritative source of truth\n        \/\/ and already mirrors assets\/timetable.xlsx exactly, so no Excel \"sync\"\n        \/\/ pass runs here. (The earlier sync collapsed multi-session courses to a\n        \/\/ single session and dropped any course whose name didn't match the\n        \/\/ sheet verbatim — see syncUploadedTimetable. The manual \"Upload\n        \/\/ timetable\" button still uses that path for ad-hoc sheet updates.)\n      }, 150);\n    }, 150);\n  }\n\n  \/* ── ONBOARDING ── *\/\n  var _pendingElectives = [];\n\n  function showOnboarding(existing, afterDone) {\n    _pendingElectives = existing ? (getSaved() || []) : [];\n\n    var ov = document.createElement('div');\n    ov.id = '_iimOv';\n    ov.style.cssText = 'position:fixed;inset:0;background:#0e0f3d;z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;font-family:\"Plus Jakarta Sans\",system-ui,sans-serif;overflow-y:auto;transition:opacity .3s';\n\n    var card = document.createElement('div');\n    card.style.cssText = 'background:#fff;border-radius:22px;padding:36px;max-width:560px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,.55)';\n    ov.appendChild(card);\n    document.body.appendChild(ov);\n\n    function step1() {\n      var nm  = existing ? existing.name    : '';\n      var sec = existing ? existing.section : '';\n      var opts = ['A','B','C','D','E','F','G','H','I'].map(function(s) {\n        return '<option value=\"' + s + '\"' + (s === sec ? ' selected' : '') + '>Section ' + s + '<\/option>';\n      }).join('');\n\n      card.innerHTML =\n        '<div style=\"text-align:center;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:#EF7A1B;margin-bottom:8px\">IIM Mumbai · Module 5 · Timetable<\/div>'\n        + '<h2 style=\"text-align:center;font-size:26px;font-weight:800;color:#16175a;margin:0 0 6px\">' + (existing ? 'Update your profile ✏️' : 'Welcome! Let\\'s set up your schedule ✨') + '<\/h2>'\n        + '<p style=\"text-align:center;font-size:14px;color:#6b6c8a;margin:0 0 28px;line-height:1.5\">Takes 30 seconds.<\/p>'\n        + '<label style=\"font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#6b6c8a;display:block;margin-bottom:6px\">Your Name<\/label>'\n        + '<input id=\"_ob_nm\" value=\"' + nm + '\" type=\"text\" placeholder=\"e.g. Mayank\" style=\"width:100%;font-size:16px;font-weight:600;padding:13px 15px;border:1.5px solid #e5e5f0;border-radius:12px;outline:none;color:#16175a;box-sizing:border-box;margin-bottom:16px\">'\n        + '<label style=\"font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#6b6c8a;display:block;margin-bottom:6px\">Your Section<\/label>'\n        + '<select id=\"_ob_sec\" style=\"width:100%;font-size:16px;font-weight:600;padding:13px 15px;border:1.5px solid #e5e5f0;border-radius:12px;outline:none;color:#16175a;background:#fff;cursor:pointer;box-sizing:border-box;margin-bottom:26px\"><option value=\"\">— choose your section —<\/option>' + opts + '<\/select>'\n        + '<button id=\"_ob_next\" style=\"width:100%;padding:15px;font-size:15px;font-weight:800;color:#fff;background:#EF7A1B;border:none;border-radius:14px;cursor:pointer;box-shadow:0 6px 18px rgba(239,122,27,.3)\">Next: Choose Electives →<\/button>'\n        + '<div id=\"_ob_err\" style=\"font-size:13px;color:#ef4444;margin-top:10px;min-height:18px;text-align:center\"><\/div>';\n\n      document.getElementById('_ob_next').addEventListener('click', function() {\n        var name = document.getElementById('_ob_nm').value.trim();\n        var sec  = document.getElementById('_ob_sec').value;\n        if (!name) { document.getElementById('_ob_err').textContent = 'Please enter your name.'; return; }\n        if (!sec)  { document.getElementById('_ob_err').textContent = 'Please choose your section.'; return; }\n        existing = { name: name, section: sec };\n        step2(name, sec);\n      });\n      document.getElementById('_ob_nm').addEventListener('keydown', function(e) {\n        if (e.key === 'Enter') document.getElementById('_ob_next').click();\n      });\n    }\n\n    function step2(name, section) {\n      var electives = getElectives();\n      var prog = progName(section);\n      var firstName = name.split(' ')[0];\n\n      card.style.maxWidth = '740px';\n      card.style.padding = '28px 32px';\n\n      var tilesHtml = '';\n      if (!electives.length) {\n        tilesHtml = '<p style=\"color:#6b6c8a;font-size:14px;text-align:center;padding:20px 0\">No elective courses found.<\/p>';\n      } else {\n        tilesHtml = '<div id=\"_ob_tiles\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-height:420px;overflow-y:auto;padding-right:4px\">';\n        electives.forEach(function(c) {\n          var sel = _pendingElectives.indexOf(c.id) !== -1;\n          var off = c.offerings[0] || {};\n          var prof = off.prof || '';\n          tilesHtml +=\n            '<div class=\"_ob_tile\" data-id=\"' + c.id + '\" style=\"border-radius:11px;padding:12px 11px;cursor:pointer;border:1.5px solid ' + (sel ? '#16175a' : '#ebebf5') + ';background:' + (sel ? '#f0f1ff' : '#fff') + ';position:relative;transition:all .13s\">'\n            + '<div class=\"_ob_ck\" style=\"position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;border:2px solid ' + (sel ? '#16175a' : '#d0d0e0') + ';background:' + (sel ? '#16175a' : 'transparent') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0\">'\n            + (sel ? '<span style=\"color:#fff;font-size:9px;font-weight:900\">✓<\/span>' : '')\n            + '<\/div>'\n            + '<div style=\"font-size:10px;font-weight:800;color:#EF7A1B;margin-bottom:5px\">' + c.code + '<\/div>'\n            + '<div style=\"font-weight:700;font-size:12.5px;color:#16175a;line-height:1.35;padding-right:22px\">' + c.name + '<\/div>'\n            + (prof ? '<div style=\"font-size:10px;color:#6b6c8a;margin-top:5px\">' + prof + '<\/div>' : '')\n            + '<\/div>';\n        });\n        tilesHtml += '<\/div>';\n      }\n\n      card.innerHTML =\n        '<div style=\"display:flex;align-items:center;gap:10px;margin-bottom:16px\">'\n        + '<button id=\"_ob_back\" style=\"border:1px solid #e5e5f0;border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;color:#6b6c8a;background:#fff;cursor:pointer;flex:0 0 auto\">← Back<\/button>'\n        + '<div><div style=\"font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;color:#EF7A1B\">' + prog + ' · Section ' + section + '<\/div>'\n        + '<div style=\"font-size:20px;font-weight:800;color:#16175a\">Hi ' + firstName + '! Pick your electives 📚<\/div><\/div><\/div>'\n        + '<p style=\"font-size:13px;color:#6b6c8a;margin:0 0 14px;line-height:1.5\">Core courses are auto-filled. Tap tiles to add electives.<\/p>'\n        + tilesHtml\n        + '<div id=\"_ob_warn\" role=\"alert\" style=\"font-size:13px;font-weight:700;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;max-height:0;padding:0 12px;overflow:hidden;transition:max-height .15s,padding .15s;margin-top:12px\"><\/div>'\n        + '<button id=\"_ob_done\" style=\"width:100%;padding:15px;font-size:15px;font-weight:800;color:#fff;background:#16175a;border:none;border-radius:14px;cursor:pointer;box-shadow:0 6px 18px rgba(22,23,90,.28);margin-top:16px\">Build ' + firstName + '\\'s Schedule →<\/button>';\n\n      \/\/ Slots a course would occupy (its first offering's day\/row pairs).\n      function _slotsOf(course) {\n        var o = course && course.offerings && course.offerings[0];\n        return (o && o.sessions || []).map(function(s) { return s.row + '|' + s.day; });\n      }\n      \/\/ Every slot already taken by this section's auto-filled cores plus the\n      \/\/ electives currently selected (optionally excluding one id).\n      function _occupied(excludeId) {\n        var occ = {}, all = window.__iimApp ? window.__iimApp.allCourses() : [];\n        all.forEach(function(c) {\n          c.offerings.forEach(function(o) {\n            if (o.section === section) (o.sessions || []).forEach(function(s) { occ[s.row + '|' + s.day] = c.name; });\n          });\n        });\n        _pendingElectives.forEach(function(eid) {\n          if (eid === excludeId) return;\n          var ec = all.find(function(x) { return x.id === eid; });\n          _slotsOf(ec).forEach(function(k) { occ[k] = ec ? ec.name : ''; });\n        });\n        return occ;\n      }\n      function _showWarn(msg) {\n        var w = document.getElementById('_ob_warn'); if (!w) return;\n        if (msg) { w.textContent = msg; w.style.maxHeight = '90px'; w.style.padding = '10px 12px'; }\n        else { w.textContent = ''; w.style.maxHeight = '0'; w.style.padding = '0 12px'; }\n      }\n      card.querySelectorAll('._ob_tile').forEach(function(tile) {\n        tile.addEventListener('click', function() {\n          var id  = this.getAttribute('data-id');\n          var idx = _pendingElectives.indexOf(id);\n          var ck  = this.querySelector('._ob_ck');\n          var on  = idx === -1;\n          if (on) {\n            \/\/ Block selecting an elective that clashes with a core or an\n            \/\/ already-selected elective, and tell the user which one.\n            var all = window.__iimApp ? window.__iimApp.allCourses() : [];\n            var cand = all.find(function(x) { return x.id === id; });\n            var occ = _occupied(id);\n            var clashWith = null;\n            _slotsOf(cand).forEach(function(k) { if (occ[k] && !clashWith) clashWith = occ[k]; });\n            if (clashWith) {\n              _showWarn('⚠️ Conflicting electives detected — “' + (cand ? cand.name : 'this course') + '” clashes with “' + clashWith + '” at the same time. Deselect one to continue.');\n              return;\n            }\n            _pendingElectives.push(id);\n          } else {\n            _pendingElectives.splice(idx, 1);\n          }\n          _showWarn('');\n          this.style.border     = '1.5px solid ' + (on ? '#16175a' : '#ebebf5');\n          this.style.background = on ? '#f0f1ff' : '#fff';\n          ck.style.border       = '2px solid ' + (on ? '#16175a' : '#d0d0e0');\n          ck.style.background   = on ? '#16175a' : 'transparent';\n          ck.innerHTML          = on ? '<span style=\"color:#fff;font-size:9px;font-weight:900\">✓<\/span>' : '';\n        });\n      });\n\n      document.getElementById('_ob_back').addEventListener('click', step1);\n      document.getElementById('_ob_done').addEventListener('click', function() {\n        var prof = existing;\n        saveProfile(prof);\n        saveSaved(_pendingElectives);\n        ov.style.opacity = '0';\n        setTimeout(function() {\n          ov.remove();\n          afterDone(prof.name, prof.section, _pendingElectives.slice());\n        }, 300);\n      });\n    }\n\n    step1();\n  }\n\n  \/* ── header buttons ── *\/\n  function patchButtons(name, section) {\n    var btns = Array.prototype.slice.call(document.querySelectorAll('button'));\n    var up   = btns.find(function(b) { return b.textContent.indexOf('Upload') !== -1; });\n    if (!up || up.__iimPatched) return;\n    up.__iimPatched = true;\n\n    up.style.cssText = 'font-size:12.5px;font-weight:800;color:#fff;background:var(--navy,#16175a);border:none;border-radius:12px;padding:10px 16px;cursor:pointer;box-shadow:0 4px 14px rgba(22,23,90,.28);transition:filter .15s';\n    up.addEventListener('mouseover', function() { this.style.filter='brightness(1.12)'; });\n    up.addEventListener('mouseout',  function() { this.style.filter=''; });\n\n    var cl = document.createElement('button');\n    cl.textContent = '✕ Clear';\n    cl.style.cssText = 'font-size:12.5px;font-weight:800;color:#ef4444;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);border-radius:12px;padding:10px 16px;cursor:pointer;transition:border-color .15s';\n    cl.addEventListener('mouseover', function() { this.style.borderColor='#ef4444'; });\n    cl.addEventListener('mouseout',  function() { this.style.borderColor='rgba(239,68,68,.22)'; });\n    cl.addEventListener('click', function() {\n      if (window.__iimApp && window.__iimApp.onClearAll) {\n        window.__iimApp.onClearAll();\n        var s = document.querySelector('select'); if (s) s.value = '';\n      }\n    });\n\n    var md = document.createElement('button');\n    md.textContent = '✏️ Modify';\n    md.style.cssText = 'font-size:12.5px;font-weight:800;color:var(--ink,#16175a);background:var(--surface-2,#f6f4ee);border:1px solid var(--line,rgba(20,21,82,.1));border-radius:12px;padding:10px 16px;cursor:pointer;transition:border-color .15s';\n    md.addEventListener('mouseover', function() { this.style.borderColor='var(--accent,#EF7A1B)'; });\n    md.addEventListener('mouseout',  function() { this.style.borderColor='var(--line,rgba(20,21,82,.1))'; });\n    md.addEventListener('click', function() {\n      showOnboarding(getProfile(), function(nm, sec, elecs) {\n        patchRenderVals(nm.split(' ')[0], sec);\n        applyAll(sec, elecs, _byName);\n      });\n    });\n\n    up.parentNode.insertBefore(cl, up);\n    up.parentNode.insertBefore(md, cl);\n  }\n\n  \/* ── footer ── *\/\n  function addFooter() {\n    var grid = document.getElementById('iimGridCapture');\n    if (!grid || document.getElementById('iimFooter')) return;\n    var f = document.createElement('div');\n    f.id = 'iimFooter';\n    f.style.cssText = 'text-align:center;margin-top:20px;font-size:12px;font-weight:600;color:var(--muted,#6b6c8a);letter-spacing:.01em';\n    f.innerHTML = 'Created with ❤️ by Mayank ✨';\n    grid.parentNode.insertBefore(f, grid.nextSibling);\n  }\n\n  \/* ── Safari section dropdown fix ── *\/\n  function safariDropdownFix() {\n    var sel = document.querySelector('select');\n    if (!sel) return;\n    if (sel.options.length <= 1 || !sel.options[1].text.trim()) {\n      while (sel.options.length > 1) sel.remove(1);\n      ['A','B','C','D','E','F','G','H','I'].forEach(function(s) {\n        var o = document.createElement('option');\n        o.value = s; o.textContent = 'Section ' + s;\n        sel.appendChild(o);\n      });\n    }\n  }\n\n  \/* ── load default timetable from assets\/timetable.xlsx ── *\/\n  function waitForXLSX(cb) {\n    var tries = 0;\n    (function tick() {\n      tries++;\n      if (window.XLSX) cb(true);\n      else if (window.__xlsxFailed || tries > 160) cb(false);\n      else setTimeout(tick, 50);\n    })();\n  }\n\n  function loadDefaultTimetable(cb) {\n    if (!window.__iimApp || !window.__iimApp.parseUploadedTimetable) { cb(null); return; }\n    waitForXLSX(function(ok) {\n      if (!ok) { cb(null); return; }\n      fetch('assets\/timetable.xlsx')\n      .then(function(r) { if (!r.ok) throw new Error('not found'); return r.arrayBuffer(); })\n      .then(function(buf) {\n        try {\n          var wb = window.XLSX.read(new Uint8Array(buf), { type: 'array' });\n          var ws = wb.Sheets[wb.SheetNames[0]];\n          var grid = window.XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: null });\n          \/\/ Strip trailing commas\/spaces — Excel often ends names with \", \"\n          grid = grid.map(function(row) {\n            if (!row) return row;\n            return row.map(function(cell) {\n              return typeof cell === 'string' ? cell.trim().replace(\/[,\\s]+$\/, '') : cell;\n            });\n          });\n          var merges = ws['!merges'] || [];\n          cb(window.__iimApp.parseUploadedTimetable(grid, merges));\n        } catch(e) { console.warn('[iim] timetable parse error:', e); cb(null); }\n      })\n      .catch(function() { cb(null); });\n    });\n  }\n\n  \/* ── INIT ── *\/\n  var _bootStarted = false;\n\n  function ensureCover() {\n    if (!document.body || document.getElementById('_iimCover')) return;\n    var cover = document.createElement('div');\n    cover.id = '_iimCover';\n    cover.style.cssText = 'position:fixed;inset:0;background:#0e0f3d;z-index:9990';\n    document.body.appendChild(cover);\n    setTimeout(safariDropdownFix, 500);\n  }\n\n  function startInit() {\n    if (_bootStarted) return;\n    _bootStarted = true;\n    ensureCover();\n    var _n = 0;\n    function _tryInit() {\n      _n++;\n      if (window.__iimApp) { _doInit(); }\n      else if (_n <= 120) { setTimeout(_tryInit, 50); }\n      else { console.warn('[iim] app did not become ready in time'); fadeCoverOnly(); }\n    }\n    function fadeCoverOnly() {\n      var cover = document.getElementById('_iimCover');\n      if (!cover) return;\n      cover.style.transition = 'opacity .35s';\n      cover.style.opacity = '0';\n      setTimeout(function() { if (cover && cover.parentNode) cover.remove(); }, 350);\n    }\n    function _doInit() {\n      function fadeCover() { fadeCoverOnly(); }\n      hideSidebar();\n      addFooter();\n      var profile = getProfile();\n      var saved   = getSaved();\n      \/\/ The built-in COURSES data already matches assets\/timetable.xlsx, so boot\n      \/\/ no longer blocks on fetching\/parsing the sheet (which previously stalled\n      \/\/ the splash for up to ~8s when the XLSX CDN was slow or offline).\n      _byName = null;\n      if (!profile) {\n        showOnboarding(null, function(name, section, elecs) {\n          patchButtons(name, section);\n          patchRenderVals(name.split(' ')[0], section);\n          applyAll(section, elecs, null);\n        });\n        setTimeout(fadeCover, 60);\n      } else {\n        patchButtons(profile.name, profile.section);\n        patchRenderVals(profile.name.split(' ')[0], profile.section);\n        applyAll(profile.section, saved, null);\n        \/\/ Cover fades after cores + electives settle (pass1 150 + pass2 150 +\n        \/\/ electives 150 + buffer).\n        setTimeout(fadeCover, 600);\n      }\n    }\n    _tryInit();\n  }\n\n  if (document.readyState === 'loading') {\n    document.addEventListener('DOMContentLoaded', ensureCover, { once: true });\n    window.addEventListener('load', startInit, { once: true });\n  } else {\n    ensureCover();\n  }\n  \/\/ This script is replayed after the outer bundler has already handled\n  \/\/ DOMContentLoaded, and in some browsers the window load event has also\n  \/\/ passed. Always queue one direct start so the profile\/onboarding layer runs.\n  setTimeout(startInit, 0);\n\n})();\n<\/script>\n\n<\/body><\/html>"</script>
